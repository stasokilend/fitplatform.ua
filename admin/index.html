<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін-панель – FitPlatform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .stat-card {
            border-radius: 15px;
            padding: 20px;
            color: white;
        }
        .stat-card i {
            font-size: 2.5rem;
            opacity: 0.7;
        }
        .stat-card .number {
            font-size: 2.5rem;
            font-weight: bold;
        }
        .stat-card .label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <!-- Навігація -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-heartbeat me-2"></i>FitPlatform</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html"><i class="fas fa-tachometer-alt"></i> Дашборд</a></li>
                    <li class="nav-item"><a class="nav-link" href="users.html"><i class="fas fa-users"></i> Користувачі</a></li>
                    <li class="nav-item"><a class="nav-link" href="exercises.html"><i class="fas fa-dumbbell"></i> Вправи</a></li>
                    <li class="nav-item"><a class="nav-link" href="stats.html"><i class="fas fa-chart-pie"></i> Статистика</a></li>
                    <li class="nav-item"><a class="nav-link" href="../dashboard.html"><i class="fas fa-user"></i> Кабінет</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Вихід</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <h2 class="mb-4"><i class="fas fa-tachometer-alt text-primary me-2"></i>Адмін-панель</h2>

        <!-- Статистика -->
        <div class="row g-3 mb-4" id="statsCards">
            <div class="col-md-3">
                <div class="stat-card bg-primary">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="number" id="statUsers">0</div>
                            <div class="label">Користувачів</div>
                        </div>
                        <i class="fas fa-users"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card bg-success">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="number" id="statExercises">0</div>
                            <div class="label">Вправ</div>
                        </div>
                        <i class="fas fa-dumbbell"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card bg-warning text-dark">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="number" id="statSessions">0</div>
                            <div class="label">Тренувань</div>
                        </div>
                        <i class="fas fa-running"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card bg-danger">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="number" id="statMinutes">0</div>
                            <div class="label">Хвилин</div>
                        </div>
                        <i class="fas fa-clock"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Останні користувачі та тренування -->
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="fas fa-user-plus me-2"></i>Нові користувачі</h5>
                    </div>
                    <div class="card-body" id="recentUsers">
                        <p class="text-muted">Завантаження...</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="fas fa-history me-2"></i>Останні тренування</h5>
                    </div>
                    <div class="card-body" id="recentSessions">
                        <p class="text-muted">Завантаження...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
