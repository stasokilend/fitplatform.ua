services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
  php:
    build: .
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: fitness_platform
      DB_USER: fitplatform
      DB_PASS: fitplatform
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: fitness_platform
      MYSQL_USER: fitplatform
      MYSQL_PASSWORD: fitplatform
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/install.sql:/docker-entrypoint-initdb.d/install.sql:ro
volumes:
  mysql_data:
