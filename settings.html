<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Налаштування – FitPlatform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .settings-section {
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            background: white;
        }
        .settings-section h5 {
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .settings-section .form-label {
            font-weight: 500;
        }
        .avatar-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            font-weight: bold;
            margin: 0 auto 15px;
        }
    </style>
</head>
<body>
    <!-- Навігація завантажиться автоматично -->

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <h2 class="mb-4"><i class="fas fa-cog text-primary me-2"></i>Налаштування аккаунта</h2>

                <!-- Аватар та основна інформація -->
                <div class="settings-section text-center">
                    <div class="avatar-circle" id="userAvatar">U</div>
                    <h4 id="userNameDisplay">Користувач</h4>
                    <p class="text-muted" id="userEmailDisplay">email@example.com</p>
                    <span class="badge bg-secondary" id="userRoleDisplay">Користувач</span>
                </div>

                <!-- Основні налаштування -->
                <div class="settings-section">
                    <h5><i class="fas fa-user me-2"></i>Основні дані</h5>
                    <form id="settingsForm">
                        <div class="mb-3">
                            <label for="settingsName" class="form-label">Повне ім'я</label>
                            <input type="text" class="form-control" id="settingsName" required>
                        </div>
                        <div class="mb-3">
                            <label for="settingsEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="settingsEmail" required>
                        </div>
                        <div id="settingsError" class="alert alert-danger d-none"></div>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>Зберегти зміни
                        </button>
                    </form>
                </div>

                <!-- Зміна пароля -->
                <div class="settings-section">
                    <h5><i class="fas fa-key me-2"></i>Зміна пароля</h5>
                    <form id="passwordForm">
                        <div class="mb-3">
                            <label for="currentPassword" class="form-label">Поточний пароль</label>
                            <input type="password" class="form-control" id="currentPassword" required>
                        </div>
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">Новий пароль</label>
                            <input type="password" class="form-control" id="newPassword" required minlength="6">
                            <small class="text-muted">Мінімум 6 символів</small>
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Підтвердження пароля</label>
                            <input type="password" class="form-control" id="confirmPassword" required>
                        </div>
                        <div id="passwordError" class="alert alert-danger d-none"></div>
                        <button type="submit" class="btn btn-warning">
                            <i class="fas fa-exchange-alt me-2"></i>Змінити пароль
                        </button>
                    </form>
                </div>

                <!-- Додаткові налаштування -->
                <div class="settings-section">
                    <h5><i class="fas fa-dumbbell me-2"></i>Налаштування тренувань</h5>
                    <a href="profile-setup.html" class="btn btn-outline-primary">
                        <i class="fas fa-edit me-2"></i>Редагувати профіль тренувань
                    </a>
                    <span class="text-muted ms-3 small">(вага, зріст, цілі, обмеження)</span>
                </div>

                <!-- Небезпечна зона -->
                <div class="settings-section border-danger">
                    <h5 class="text-danger"><i class="fas fa-exclamation-triangle me-2"></i>Небезпечна зона</h5>
                    <p class="text-muted small">Ці дії незворотні. Будьте обережні.</p>
                    <button class="btn btn-outline-danger" id="deleteAccountBtn">
                        <i class="fas fa-trash me-2"></i>Видалити аккаунт
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Контейнер для тостів -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
