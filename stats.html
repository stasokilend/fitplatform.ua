<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика – FitPlatform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html"><i class="fas fa-heartbeat me-2"></i>FitPlatform</a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fas fa-home"></i> Кабінет</a></li>
                <li class="nav-item"><a class="nav-link active" href="stats.html"><i class="fas fa-chart-line"></i> Статистика</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Вихід</a></li>
            </ul>
        </div>
    </nav>

    <div class="container py-4">
        <h2 class="mb-4"><i class="fas fa-chart-pie text-primary me-2"></i>Моя статистика</h2>

        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card bg-primary text-white text-center p-3">
                    <h6>Всього тренувань</h6>
                    <h2 id="totalSessions">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-success text-white text-center p-3">
                    <h6>Всього хвилин</h6>
                    <h2 id="totalMinutes">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-warning text-dark text-center p-3">
                    <h6>Середній пульс</h6>
                    <h2 id="avgHeartRate">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-danger text-white text-center p-3">
                    <h6>Спалені калорії</h6>
                    <h2 id="totalCalories">0</h2>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header">
                        <h5 class="mb-0">Тривалість тренувань (останні 7)</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="durationChart" height="200"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header">
                        <h5 class="mb-0">Спалені калорії</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="caloriesChart" height="200"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mt-4">
            <div class="card-header">
                <h5 class="mb-0">Історія тренувань</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped" id="historyTable">
                        <thead>
                            <tr>
                                <th>Дата</th>
                                <th>Тривалість</th>
                                <th>Пульс (сер.)</th>
                                <th>Калорії</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody">
                            <tr><td colspan="4" class="text-center">Немає даних</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/stats.js"></script>
</body>
</html>
